music_directory "/Users/grogu/Music/backup/am/Apple Music/"
playlist_directory "/Users/grogu/.mpd/playlists"
db_file "/Users/grogu/.mpd/mpd.db"
log_file "/Users/grogu/.mpd/mpd.log"
pid_file "/Users/grogu/.mpd/mpd.pid"
state_file "/Users/grogu/.mpd/mpdstate"
auto_update "yes"
auto_update_depth "0"
follow_outside_symlinks "yes"
follow_inside_symlinks "yes"

audio_output {
 type "osx"
 name "CoreAudio"
 mixer_type "software"
}

audio_output {
	type		"httpd"
	name		"bwaklog radio"
	encoder		"lame"		# optional, vorbis or lame
	port		"8000"
	bind_to_address	"0.0.0.0"		# optional, IPv4 or IPv6
#	quality		"5.0"			# do not define if bitrate is defined
	bitrate		"128"			# do not define if quality is defined
    format "44100:16:2"
	max_clients	"0"			# optional 0=no limit
}

