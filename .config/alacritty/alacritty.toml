[window]
padding.x = 10
padding.y = 10
dynamic_padding = true

decorations = "buttonless"

[env]
term = "xterm-256color"

[font]
normal.family = "Liga SFMono Nerd Font"
bold.family = "Liga SFMono Nerd Font"
italic.family = "Liga SFMono Nerd Font"
bold_italic.family = "Liga SFMono Nerd Font"

size = 16.0

[cursor]
style.blinking = "Always"

[debug]
# render_timer = true

[keyboard]
bindings = [
  { key = "Space", mods = "Option|Control", action = "ToggleViMode" },
  { key = "Enter", mods = "Option", action = "ToggleSimpleFullscreen" },
]

[general]

live_config_reload = true
# import = ["~/alacritty-theme/themes/pastel_dark.toml"]
# import = ["~/alacritty-theme/themes/rose-pine.toml"]
